<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Vision | Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="logo-text">LED<span>Vision</span></span>
        </div>
        <h2>Panel de monitoreo</h2>
      </div>

      <form class="login-form" method="POST">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" required placeholder="Ingresa tu usuario">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
        </div>

        <button type="submit" class="login-button">Acceder al sistema</button>
      </form>

      {% if error %}
        <p class="error-message">{{ error }}</p>
      {% endif %}
    </div>
  </div>
</body>
</html>
