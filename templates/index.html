<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor LEDs</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .valores {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            padding: 20px;
            background: #2d2d2d;
            border-radius: 10px;
        }
        .valor {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #3d3d3d;
            border-radius: 8px;
        }
        .numero {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }
        .rojo { color: #ff4444; }
        .verde { color: #00C851; }
        .chart-container {
            height: 400px;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
        }
        .progress-bar {
            height: 20px;
            background: #3d3d3d;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Monitoreo de LEDs</h1>
        
        <div class="valores">
            <div class="valor">
                <div>🔴 LED Rojo</div>
                <div class="numero rojo" id="led-rojo-valor">0</div>
            </div>
            <div class="valor">
                <div>🟢 LED Verde</div>
                <div class="numero verde" id="led-verde-valor">0</div>
            </div>
            <div class="valor">
                <div>💡 LDR</div>
                <div class="numero" id="ldr-valor">0</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="ldr-progress"></div>
                </div>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
        
        <div style="margin-top: 20px; color: #aaa; text-align: center;">
            Última actualización: <span id="ultima-actualizacion">--</span>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
